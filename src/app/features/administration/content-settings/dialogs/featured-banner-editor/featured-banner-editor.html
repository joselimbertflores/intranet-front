<div class="mb-4 flex justify-end">
  <p-button
    icon="pi pi-plus"
    label="Agregar"
    size="small"
    [outlined]="true"
    (onClick)="addBanner()"
  />
</div>

@if (hasErrorMessage()) {
  <p-message severity="error"
    >Revisa los campos requeridos, la imagen y el formato de la URL.</p-message
  >
}

<form [formGroup]="form" (ngSubmit)="save()" class="mt-4 flex flex-col gap-4">
  <div
    #scrollContainer
    cdkDropList
    formArrayName="items"
    class="app-drag-list flex max-h-[520px] flex-col gap-4 overflow-y-auto pr-1"
    (cdkDropListDropped)="drop($event)"
  >
    @for (control of items.controls; track control; let i = $index) {
      <article
        cdkDrag
        [formGroupName]="i"
        class="app-drag-card overflow-hidden rounded-xl border border-surface-200 bg-surface-0"
      >
        <header
          class="flex items-center justify-between border-b border-surface-200 bg-surface-50 px-4 py-2"
        >
          <div class="flex items-center gap-3">
            <button
              type="button"
              cdkDragHandle
              class="cursor-grab rounded-md p-1.5 text-surface-400 hover:bg-surface-100"
              aria-label="Reordenar banner"
            >
              <i class="pi pi-bars"></i>
            </button>
            <span class="text-sm font-semibold text-surface-800"
              >Destacado {{ i + 1 }}</span
            >
          </div>
          <p-button
            type="button"
            icon="pi pi-trash"
            [text]="true"
            severity="danger"
            size="small"
            (onClick)="removeBanner(i)"
          />
        </header>

        <div class="grid grid-cols-1 items-start gap-5 p-4 md:grid-cols-12">
          <div class="md:col-span-4">
            <button
              type="button"
              class="group relative flex aspect-[16/9] w-full items-center justify-center overflow-hidden rounded-xl border-2"
              [ngClass]="
                images()[i]?.preview
                  ? 'border-transparent bg-surface-900'
                  : 'border-dashed border-surface-300 bg-surface-50 hover:border-primary-400'
              "
              (click)="fileInput.click()"
            >
              @if (images()[i]?.preview) {
                <img
                  [src]="images()[i]?.preview"
                  class="h-full w-full object-cover"
                  alt="Vista previa del banner destacado"
                />
                <span
                  class="absolute inset-0 flex items-center justify-center bg-black/50 text-sm font-medium text-white opacity-0 transition-opacity group-hover:opacity-100"
                  >Cambiar imagen</span
                >
              } @else {
                <span class="flex flex-col items-center gap-2 text-surface-500"
                  ><i class="pi pi-image text-3xl"></i
                  ><span class="text-sm font-medium">Subir imagen</span></span
                >
              }
            </button>
            <input
              #fileInput
              type="file"
              accept="image/jpeg,image/png,image/webp"
              class="hidden"
              (change)="onFileSelected($event, i)"
            />
            <p class="mt-2 text-xs text-surface-500">
              Recomendado: imagen horizontal 16:9.
            </p>
          </div>

          <div class="flex flex-col gap-4 md:col-span-8">
            <p-floatlabel variant="on">
              <input pInputText class="w-full" formControlName="title" />
              <label>Título</label>
            </p-floatlabel>
            <p-floatlabel variant="on">
              <textarea
                pTextarea
                rows="2"
                class="w-full resize-none"
                formControlName="description"
              ></textarea>
              <label>Descripción (opcional)</label>
            </p-floatlabel>
            <div class="grid grid-cols-1 gap-4 md:grid-cols-2">
              <p-floatlabel variant="on">
                <input pInputText class="w-full" formControlName="linkLabel" />
                <label>Texto del botón</label>
              </p-floatlabel>
              <p-floatlabel variant="on">
                <input pInputText class="w-full" formControlName="url" />
                <label>Ruta o URL</label>
              </p-floatlabel>
            </div>
            <div class="flex items-center gap-2">
              <p-checkbox
                formControlName="isActive"
                [binary]="true"
                [inputId]="'featured-banner-active-' + i"
              />
              <label
                [for]="'featured-banner-active-' + i"
                class="cursor-pointer text-sm font-medium text-surface-700"
                >Banner activo</label
              >
            </div>
          </div>
        </div>
      </article>
    } @empty {
      <div
        class="rounded-xl border border-dashed border-surface-300 py-12 text-center"
      >
        <p class="font-medium text-surface-700">No hay banners destacados.</p>
        <p class="mt-1 text-sm text-surface-500">Agrega uno para comenzar.</p>
      </div>
    }
  </div>

  <div class="p-dialog-footer">
    <p-button
      type="button"
      label="Cancelar"
      severity="secondary"
      (onClick)="close()"
    />
    <p-button
      type="submit"
      label="Guardar cambios"
      [loading]="saving()"
      [disabled]="saving()"
    />
  </div>
</form>

<p-confirmdialog />
