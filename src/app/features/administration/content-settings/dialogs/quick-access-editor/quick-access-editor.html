<form [formGroup]="form" (ngSubmit)="save()">
  <div class="flex items-center justify-end p-2">
    <!-- <app-ui-button
      type="button"
      icon="ui-icon ui-icon-plus"
      size="small"
      label="Agregar"
      [outlined]="true"
      (onClick)="addItem()"
    /> -->
  </div>

  <div
    #scrollContainer
    cdkDropList
    (cdkDropListDropped)="drop($event)"
    class="app-drag-list flex max-h-[450px] flex-col gap-y-3 overflow-y-auto rounded-xl p-2"
    formArrayName="items"
  >
    @for (item of itemsFormArray.controls; track item; let i = $index) {
      <div
        class="app-drag-card rounded-xl border border-surface-200 bg-surface-0 shadow-sm transition-colors hover:border-primary-400"
        [formGroupName]="i"
        cdkDrag
      >
        <div class="flex flex-col gap-4 p-4">
          <div class="flex items-center justify-between gap-3">
            <div class="flex items-center gap-3">
              <button
                type="button"
                cdkDragHandle
                class="cursor-grab rounded-md p-2 text-surface-400 hover:text-surface-700 active:cursor-grabbing"
                appUiTooltip="Arrastrar para ordenar"
              >
                <i class="ui-icon ui-icon-bars text-xl"></i>
              </button>
              <div
                class="flex h-12 w-12 items-center justify-center rounded-lg border border-surface-200 bg-surface-50"
              >
                <i
                  [class]="
                    getQuickAccessIcon(
                      $safeNavigationMigration(item.get('iconKey')?.value)
                    )
                  "
                  class="text-primary-600"
                  style="font-size: 1.5rem"
                ></i>
              </div>
              <span class="text-sm font-semibold text-surface-600">
                Acceso {{ i + 1 }}
              </span>
            </div>
            <!-- 
            <app-ui-button
              type="button"
              [text]="true"
              severity="danger"
              [rounded]="true"
              icon="ui-icon ui-icon-trash"
              (onClick)="removeItem(i)"
              appUiTooltip="Eliminar acceso"
            /> -->
          </div>
          <div class="grid grid-cols-1 gap-4 md:grid-cols-12">
            <div class="flex flex-col gap-1 md:col-span-4">
              <!-- <app-ui-floatlabel variant="on">
                <input appUiInput class="w-full" formControlName="title" />
                <label>Título</label>
              </app-ui-floatlabel>
              @if (formUtils.isInvalid(form.get("items." + i + ".title"))) {
                <app-ui-message severity="error" size="small" variant="simple">
                  {{
                    formUtils.getErrorMessage(form.get("items." + i + ".title"))
                  }}
                </app-ui-message>
              } -->
            </div>

            <div class="flex flex-col gap-1 md:col-span-5">
              <!-- <app-ui-floatlabel variant="on">
                <input appUiInput class="w-full" formControlName="url" />
                <label>URL</label>
              </app-ui-floatlabel>
              @if (formUtils.isInvalid(form.get("items." + i + ".url"))) {
                <app-ui-message severity="error" size="small" variant="simple">
                  {{
                    formUtils.getErrorMessage(form.get("items." + i + ".url"))
                  }}
                </app-ui-message>
              } -->
            </div>

            <div class="flex flex-col gap-1 md:col-span-3">
              <!-- <app-ui-select
                class="w-full"
                formControlName="iconKey"
                [options]="iconOptions"
                optionLabel="label"
                optionValue="value"
                placeholder="Icono"
                appendTo="body"
              >
                <ng-template #selectedItem let-option>
                  <span class="flex items-center gap-2">
                    <i [class]="option.icon"></i>
                    {{ option.label }}
                  </span>
                </ng-template>
                <ng-template appUiTemplate="item" let-option>
                  <span class="flex items-center gap-2">
                    <i [class]="option.icon"></i>
                    {{ option.label }}
                  </span>
                </ng-template>
              </app-ui-select> -->
            </div>

            <div class="md:col-span-9">
              <!-- <app-ui-floatlabel variant="on">
                <textarea
                  appUiTextarea
                  class="w-full resize-none"
                  rows="2"
                  formControlName="description"
                ></textarea>
                <label>Descripción (opcional)</label>
              </app-ui-floatlabel> -->
            </div>

            <div class="flex items-center gap-2 md:col-span-3">
              <!-- <app-ui-checkbox
                formControlName="isActive"
                [binary]="true"
                [inputId]="'quick-access-active-' + i"
              /> -->
              <label
                [for]="'quick-access-active-' + i"
                class="cursor-pointer text-sm font-medium text-surface-700"
              >
                Acceso activo
              </label>
            </div>
          </div>
        </div>
      </div>
    } @empty {
      <div class="flex flex-col items-center justify-center p-8">
        <span class="font-medium">No hay accesos rápidos agregados.</span>
        <span class="text-sm">Haz clic en “Agregar” para comenzar.</span>
      </div>
    }
  </div>

  <div class="app-dialog-actions">
    <!-- <app-ui-button
      type="button"
      label="Cancelar"
      severity="secondary"
      (onClick)="close()"
    />
    <app-ui-button type="submit" label="Guardar" /> -->
  </div>
</form>
<!-- <app-ui-confirmdialog /> -->
