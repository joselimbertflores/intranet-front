<form [formGroup]="form" (ngSubmit)="save()" class="space-y-5 pt-1">
  <div class="flex flex-col gap-1">
    <p-floatlabel variant="on">
      <input
        id="siteName"
        pInputText
        class="w-full"
        formControlName="name"
        [invalid]="formUtils.isInvalid(form.controls.name)"
      />
      <label for="siteName">Nombre de la sede *</label>
    </p-floatlabel>
    @if (formUtils.isInvalid(form.controls.name)) {
      <p-message severity="error" size="small" variant="simple">
        {{ formUtils.getErrorMessage(form.controls.name) }}
      </p-message>
    }
  </div>

  <div class="flex items-center gap-2 rounded-lg bg-surface-50 px-3 py-2">
    <p-checkbox inputId="siteActive" formControlName="isActive" [binary]="true" />
    <label for="siteActive" class="cursor-pointer text-sm font-medium">Sede activa</label>
  </div>

  <div class="p-dialog-footer">
    <p-button type="button" label="Cancelar" severity="secondary" (onClick)="close()" />
    <p-button type="submit" label="Guardar" />
  </div>
</form>
