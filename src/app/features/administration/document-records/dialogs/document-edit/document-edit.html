<form [formGroup]="form" (ngSubmit)="save()">
  <div class="flex flex-col gap-y-4 pt-2">
    <p-floatlabel variant="on">
      <p-treeSelect
        inputId="orgUnit"
        class="w-full"
        appendTo="body"
        [filter]="true"
        filterPlaceholder="Buscar unidad"
        emptyMessage="Sin resultados"
        formControlName="organizationalUnitNode"
        [invalid]="formUtils.isInvalid(form.get('organizationalUnitNode'))"
        [options]="organizationTree()"
      />
      <label for="orgUnit">Unidad organizacional *</label>
    </p-floatlabel>
    <p-floatlabel class="w-full" variant="on">
      <p-select
        [options]="documentTypes()"
        optionLabel="name"
        optionValue="id"
        appendTo="body"
        class="w-full"
        inputId="docType"
        [filter]="true"
        emptyMessage="Sin elementos"
        filterPlaceholder="Nombre del tipo"
        formControlName="documentTypeId"
        [invalid]="formUtils.isInvalid(form.get('documentTypeId'))"
        (onChange)="selectDocumentType($event.value)"
      />
      <label for="docType">Tipo de documento *</label>
    </p-floatlabel>
    <p-floatlabel class="w-full" variant="on">
      <p-select
        [options]="documentSubtypes()"
        optionLabel="name"
        optionValue="id"
        appendTo="body"
        class="w-full"
        emptyMessage="Sin elementos"
        inputId="docSubType"
        [filter]="true"
        filterPlaceholder="Nombre del subtipo"
        formControlName="documentSubtypeId"
        [showClear]="true"
      />
      <label for="docSubType">Subtipo (Opcional)</label>
    </p-floatlabel>

    <div class="flex flex-col sm:flex-row gap-4">
      <p-floatlabel class="w-full" variant="on">
        <p-select
          [options]="yearOptions"
          [filter]="true"
          [showClear]="true"
          filterPlaceholder="Buscar gestión"
          optionLabel="label"
          optionValue="value"
          appendTo="body"
          class="w-full"
          emptyMessage="Sin elementos"
          inputId="yearInput"
          formControlName="year"
        />
        <label for="yearInput">Gestión (Opcional)</label>
      </p-floatlabel>
      <p-floatlabel class="w-full" variant="on">
        <p-select
          [options]="documentStatusOptions"
          filterPlaceholder="Buscar gestión"
          appendTo="body"
          class="w-full"
          emptyMessage="Sin elementos"
          inputId="statusInput"
          formControlName="status"
        />
        <label for="statusInput">Estado</label>
      </p-floatlabel>
    </div>
    <p-floatlabel variant="on">
      <input pInputText id="docName" formControlName="title" class="w-full" />
      <label for="docName">Nombre del documento</label>
    </p-floatlabel>
  </div>

  <div class="mt-4">
    <div class="rounded-2xl border border-surface-200 p-4">
      <h3 class="leading-6 font-medium text-surface-900 mb-4">Archivo</h3>
      <div class="flow-root">
        <dl class="-my-3 divide-y divide-surface-200 text-sm">
          <div class="grid grid-cols-1 gap-1 py-1 sm:grid-cols-3 sm:gap-4">
            <dt class="font-medium text-surface-900">Nombre original:</dt>
            <dd class="text-surface-700 sm:col-span-2">
              <div class="flex items-center gap-x-2">
                <file-icon [mimeType]="data.file.mimeType" />
                <span>{{ data.file.originalName }}</span>
              </div>
            </dd>
          </div>
          <div class="grid grid-cols-1 gap-1 py-1 sm:grid-cols-3 sm:gap-4">
            <dt class="font-medium text-surface-900">Descargas:</dt>

            <dd class="text-surface-700 sm:col-span-2">
              <!-- {{ data.downloadCount }} -->
            </dd>
          </div>

          <div class="grid grid-cols-1 gap-1 py-1 sm:grid-cols-3 sm:gap-4">
            <dt class="font-medium text-surface-900">Tamaño:</dt>

            <dd class="text-surface-700 sm:col-span-2">
              {{ data.file.sizeBytes | fileSize }}
            </dd>
          </div>

          <div class="grid grid-cols-1 gap-1 py-1 sm:grid-cols-3 sm:gap-4">
            <dt class="font-medium text-surface-900">Fecha creación:</dt>

            <dd class="text-surface-700 sm:col-span-2">
              {{ data.createdAt | date: "short" }}
            </dd>
          </div>
          <div class="grid grid-cols-1 gap-1 py-1 sm:grid-cols-3 sm:gap-4">
            <dt class="font-medium text-surface-900">Fecha edición:</dt>

            <dd class="text-surface-700 sm:col-span-2">
              {{ data.updatedAt | date: "short" }}
            </dd>
          </div>
        </dl>
      </div>

      <div class="mt-6 space-y-3">
        <div class="flex items-center gap-2">
          <p-checkbox
            [(ngModel)]="replaceFile"
            binary="true"
            [ngModelOptions]="{ standalone: true }"
            (onChange)="onReplaceChange($event.checked)"
          ></p-checkbox>
          <label class="text-sm text-surface-600"> Reemplazar archivo </label>
        </div>

        @if (replaceFile()) {
          <p-fileUpload
            mode="basic"
            class="w-full"
            [customUpload]="true"
            [auto]="false"
            [maxFileSize]="maxFileSizeBytes"
            [accept]="acceptAttribute"
            chooseLabel="Seleccionar"
            (onSelect)="onSelectFile($event)"
            invalidFileSizeMessageSummary="Tamaño máximo"
            [invalidFileSizeMessageDetail]="maxFileSizeLabel"
            invalidFileTypeMessageSummary="Formatos permitidos:"
            [invalidFileTypeMessageDetail]="allowedExtensionsLabel"
          />
        }
      </div>
    </div>
  </div>

  <div class="p-dialog-footer">
    <p-button label="Cancelar" severity="secondary" (onClick)="close()" />
    <p-button type="submit" label="Guardar" [disabled]="!isFormValid" />
  </div>
</form>
