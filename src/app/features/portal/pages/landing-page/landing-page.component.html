<landing-hero-section />

@if (data().quickAccess.length > 0) {
  <landing-quick-access-section [items]="data().quickAccess" />
}
@if (data().banners.length > 0) {
  <landing-banners-section [banners]="data().banners" />
}
@if (data().communications.length > 0) {
  <landing-communications-section [communications]="data().communications" />
}

@if (data().documents.length > 0) {
  <landing-documents-section [documents]="data().documents" />
}
