<div class="flex h-dvh min-h-0 overflow-hidden bg-surface-50">
  <a
    href="#admin-main-content"
    class="sr-only rounded-md bg-primary-600 px-3 py-2 text-sm font-medium text-primary-50 shadow-sm focus:not-sr-only focus:absolute focus:top-3 focus:left-3 focus:z-50"
  >
    Saltar al contenido principal
  </a>

  <aside
    class="hidden h-full min-h-0 w-72 shrink-0 overflow-hidden border-r border-surface-200 bg-surface-0 lg:block"
    aria-label="Panel de administración"
  >
    @if (isDesktop()) {
      <app-admin-sidebar />
    }
  </aside>

  <div class="flex min-h-0 min-w-0 flex-1 flex-col overflow-hidden">
    <header
      class="flex h-14 shrink-0 items-center gap-3 border-b border-surface-200 bg-surface-0 px-4"
    >
      <p-button
        type="button"
        icon="pi pi-bars"
        [text]="true"
        [rounded]="true"
        ariaLabel="Abrir menú de administración"
        styleClass="lg:hidden"
        [pt]="{
          root: {
            'aria-controls': 'admin-mobile-navigation',
            'aria-expanded': mobileMenuOpen(),
          },
        }"
        (onClick)="openMobileMenu()"
      />

      <div class="min-w-0 flex-1"></div>
      <profile-overlay />
    </header>

    <main
      id="admin-main-content"
      tabindex="-1"
      class="min-h-0 min-w-0 flex-1 overflow-auto overscroll-contain p-4 sm:p-6"
      cdkScrollable
    >
      <router-outlet />
    </main>
  </div>
</div>

@if (!isDesktop()) {
  <p-drawer
    id="admin-mobile-navigation"
    position="left"
    [modal]="true"
    [blockScroll]="true"
    [(visible)]="mobileMenuOpen"
    styleClass="max-w-full overflow-hidden"
  >
    <ng-template #headless>
      <app-admin-sidebar
        [showCloseButton]="true"
        (closeRequested)="closeMobileMenu()"
      />
    </ng-template>
  </p-drawer>
}
